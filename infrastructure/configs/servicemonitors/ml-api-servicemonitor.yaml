apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ml-api
  namespace: ml-api
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: ml-api          # must match the Service's labels in apps/ml-api
  namespaceSelector:
    matchNames:
      - ml-api
  endpoints:
    - port: http            # must match the named port on the ml-api Service
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
