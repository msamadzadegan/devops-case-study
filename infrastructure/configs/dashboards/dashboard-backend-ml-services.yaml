apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-voize-backend-ml-services
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  deep-dive.json: |
    {
      "title": "Voize Platform — Technical Backend and ML API",
      "uid": "voize-backend-ml-services",
      "tags": [
        "deep-dive",
        "triage",
        "voize"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "graphTooltip": 2,
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "links": [
        {
          "title": "← Command Center",
          "type": "link",
          "url": "/d/voize-command-center",
          "keepTime": true,
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "name": "Firing Alerts",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": false,
            "hide": false,
            "iconColor": "red",
            "expr": "ALERTS{alertstate=\"firing\", namespace=~\"ml-api|backend-api\"}",
            "step": "60s",
            "titleFormat": "{{alertname}} [{{severity}}]",
            "textFormat": "{{namespace}}"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "ml_pod",
            "label": "ML API Pod",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(ml_api_requests_total, pod)",
            "query": {
              "query": "label_values(ml_api_requests_total, pod)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "sort": 1
          },
          {
            "name": "backend_pod",
            "label": "Backend API Pod",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(backend_api_requests_total, pod)",
            "query": {
              "query": "label_values(backend_api_requests_total, pod)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 100,
