          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 1,
          "type": "timeseries",
          "title": "ML API — Request Rate by Endpoint",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 6,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false,
                "scaleDistribution": {
                  "type": "linear"
                },
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
