apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-voize-overview
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  command-center.json: |
    {
      "title": "Voize Platform — Overview",
      "uid": "voize-overview",
      "tags": [
        "overview",
        "command-center",
        "voize"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "graphTooltip": 2,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "links": [
        {
          "title": "→ Technical Deep Dive",
          "type": "link",
          "url": "/d/voize-deep-dive",
          "keepTime": true,
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "name": "Firing Alerts",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": false,
            "hide": false,
            "iconColor": "red",
            "expr": "ALERTS{alertstate=\"firing\", namespace=~\"ml-api|backend-api\"}",
            "step": "60s",
            "titleFormat": "{{alertname}} [{{severity}}]",
            "textFormat": "{{namespace}}"
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "System Status",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
